name: Check for Missing .meta Files

# This workflow runs on every push and pull request to any branch
on: [push, pull_request]

jobs:
  check-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find items with missing .meta files
        run: |
          echo "Searching for missing .meta files..."
          MISSING_META_FILES=""

          # Updated the grep pattern to also exclude paths ending in '~'
          for file in $(git ls-files | grep -v -E '~$|\.meta$|\.signature$|^\.git'); do
            if [ ! -f "$file.meta" ]; then
              echo "ERROR: Missing .meta file for file: $file"
              MISSING_META_FILES="$MISSING_META_FILES\n$file"
            fi
          done

          # Gets the unique directory paths from the list of tracked files.
          for dir in $(git ls-files | xargs -n1 dirname | sort -u | grep -v -E '~$|^\.$'); do
            if [ ! -f "$dir.meta" ]; then
              echo "ERROR: Missing .meta file for directory: $dir"
              MISSING_META_FILES="$MISSING_META_FILES\n$dir"
            fi
          done

          if [ -n "$MISSING_META_FILES" ]; then
            echo "::error::Found files or directories with missing .meta files. Please generate them in the Unity Editor before committing."
            exit 1
          else
            echo "All required .meta files are present. ✅"
          fi